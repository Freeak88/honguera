# Hoguera — Stack de Software
# Mosquitto (MQTT) + InfluxDB (timeseries) + Node-RED (dashboard)

version: "3.8"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: hoguera-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    configs:
      - source: mosquitto_conf
        target: /mosquitto/config/mosquitto.conf

  influxdb:
    image: influxdb:2.7
    container_name: hoguera-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=hoguera
      - DOCKER_INFLUXDB_INIT_PASSWORD=changeme_secure
      - DOCKER_INFLUXDB_INIT_ORG=hoguera
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
      - DOCKER_INFLUXDB_INIT_RETENTION=90d
    volumes:
      - influxdb_data:/var/lib/influxdb2

  nodered:
    image: nodered/node-red:latest
    container_name: hoguera-dashboard
    restart: unless-stopped
    ports:
      - "1880:1880"
    environment:
      - FLOWS=/data/flows_hoguera.json
    volumes:
      - nodered_data:/data
    depends_on:
      - mosquitto
      - influxdb

  grafana:
    image: grafana/grafana:latest
    container_name: hoguera-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=hoguera
      - GF_SECURITY_ADMIN_PASSWORD=changeme_secure
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  nodered_data:
  grafana_data:

configs:
  mosquitto_conf:
    content: |
      persistence true
      persistence_location /mosquitto/data/
      log_dest stdout
      allow_anonymous false
      password_file /mosquitto/config/passwd
      listener 1883
