<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- Mycelium network -->
  <g stroke="#a78bfa" stroke-opacity="0.5" fill="none" stroke-width="1.2" stroke-linecap="round">
    <!-- Main branches -->
    <path d="M 80,100 Q 140,60 200,80 Q 260,100 320,70 Q 380,40 440,65 Q 500,90 560,55"/>
    <path d="M 80,100 Q 130,130 190,115 Q 250,100 310,120 Q 370,140 430,110 Q 490,80 560,100"/>
    <path d="M 80,100 Q 150,150 220,140 Q 290,130 350,150 Q 410,170 470,140 Q 530,110 560,145"/>
    <!-- Sub-branches -->
    <path d="M 200,80 Q 215,40 240,30"/>
    <path d="M 200,80 Q 185,50 170,35"/>
    <path d="M 320,70 Q 335,35 350,25"/>
    <path d="M 320,70 Q 310,45 295,30"/>
    <path d="M 440,65 Q 455,35 470,20"/>
    <path d="M 310,120 Q 295,145 280,160"/>
    <path d="M 430,110 Q 445,135 455,155"/>
    <path d="M 350,150 Q 340,170 330,185"/>
    <!-- Hyphal tips -->
    <circle cx="240" cy="30" r="3" fill="#c4b5fd" stroke="none" opacity="0.7"/>
    <circle cx="170" cy="35" r="3" fill="#c4b5fd" stroke="none" opacity="0.7"/>
    <circle cx="350" cy="25" r="3" fill="#c4b5fd" stroke="none" opacity="0.7"/>
    <circle cx="295" cy="30" r="3" fill="#c4b5fd" stroke="none" opacity="0.7"/>
    <circle cx="470" cy="20" r="3" fill="#c4b5fd" stroke="none" opacity="0.7"/>
    <circle cx="280" cy="160" r="3" fill="#c4b5fd" stroke="none" opacity="0.7"/>
    <circle cx="455" cy="155" r="3" fill="#c4b5fd" stroke="none" opacity="0.7"/>
    <circle cx="330" cy="185" r="3" fill="#c4b5fd" stroke="none" opacity="0.7"/>
    <!-- Nodes -->
    <circle cx="200" cy="80" r="4" fill="#8b5cf6" stroke="none" opacity="0.8"/>
    <circle cx="320" cy="70" r="4" fill="#8b5cf6" stroke="none" opacity="0.8"/>
    <circle cx="440" cy="65" r="4" fill="#8b5cf6" stroke="none" opacity="0.8"/>
    <circle cx="190" cy="115" r="4" fill="#8b5cf6" stroke="none" opacity="0.8"/>
    <circle cx="310" cy="120" r="4" fill="#8b5cf6" stroke="none" opacity="0.8"/>
    <circle cx="430" cy="110" r="4" fill="#8b5cf6" stroke="none" opacity="0.8"/>
    <circle cx="220" cy="140" r="4" fill="#8b5cf6" stroke="none" opacity="0.8"/>
    <circle cx="350" cy="150" r="4" fill="#8b5cf6" stroke="none" opacity="0.8"/>
    <circle cx="470" cy="140" r="4" fill="#8b5cf6" stroke="none" opacity="0.8"/>
  </g>
  <!-- Origin node (the body, the source) -->
  <circle cx="80" cy="100" r="7" fill="#7c3aed" stroke="#a78bfa" stroke-width="2" opacity="0.9"/>
  <circle cx="80" cy="100" r="14" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.4"/>
  <!-- Glow -->
  <circle cx="320" cy="100" r="180" fill="url(#glow)"/>
</svg>
