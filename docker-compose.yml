services:
  # Broker MQTT
  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: hoguera-mosquitto
    ports:
      - "1883:1883"  # MQTT sin encriptar (WiFi local)
      - "9001:9001"  # WebSockets (opcional para dashboard)
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/logs:/mosquitto/log
    restart: unless-stopped
    networks:
      - hoguera-net

  # Time Series Database
  influxdb:
    image: influxdb:2.7-alpine
    container_name: hoguera-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=hoguera_secure_2026
      - DOCKER_INFLUXDB_INIT_ORG=hoguera
      - DOCKER_INFLUXDB_INIT_BUCKET=sensors
      - DOCKER_INFLUXDB_INIT_RETENTION=30d
    volumes:
      - ./influxdb/data:/var/lib/influxdb2
      - ./influxdb/config:/etc/influxdb2
    restart: unless-stopped
    networks:
      - hoguera-net

  # Visualización y Orquestación
  node-red:
    image: nodered/node-red:3.1.9-minimal
    container_name: hoguera-nodered
    ports:
      - "1880:1880"
    environment:
      - TZ=America/Argentina/Buenos_Aires
    volumes:
      - ./nodered/data:/data
    depends_on:
      - mosquitto
      - influxdb
    restart: unless-stopped
    networks:
      - hoguera-net

  # (Opcional) Dashboard visual
  grafana:
    image: grafana/grafana:10.3.3
    container_name: hoguera-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=hoguera_vis_2026
      - GF_INSTALL_PLUGINS=grafana-influxdb-flux-datasource
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    restart: unless-stopped
    networks:
      - hoguera-net

networks:
  hoguera-net:
    driver: bridge
